<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#206080" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="신규회선 날짜체크" />
    <title>신규회선 날짜체크</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=151" />
  </head>
  <body>
    <div id="splashScreen" class="splash-screen" aria-label="시작 화면">
      <img src="./splash.png" alt="적자생존 신규회선 날짜체크 시작 이미지" />
    </div>

    <div id="pinLock" class="pin-lock hidden">
      <div class="pin-card">
        <p class="eyebrow">잠금</p>
        <h2>PIN을 입력하세요</h2>
        <input id="pinUnlockInput" type="password" inputmode="numeric" maxlength="12" placeholder="PIN" />
        <button id="pinUnlockButton" type="button">열기</button>
        <p id="pinMessage" class="pin-message"></p>
      </div>
    </div>

    <main class="app">
      <section class="topbar">
        <div class="app-version">v.1.5.1 by 후추</div>
        <div class="title-block">
          <p class="eyebrow" aria-hidden="true">&nbsp;</p>
          <div class="title-line">
            <h1>신규회선 날짜체크</h1>
          </div>
          <p class="tagline">메모는 미래의 나에게 보내는 편지다.</p>
        </div>
        <div class="today-box">
          <span>오늘</span>
          <strong id="todayText"></strong>
        </div>
      </section>

      <section id="backupNotice" class="notice hidden" aria-label="백업 알림"></section>

      <section class="entry-panel" aria-label="신규회선 입력">
        <div class="panel-title">
          <strong>회선 추가 입력하기</strong>
        </div>
        <form id="lineForm" class="line-form">
          <label>
            <span>명의자</span>
            <input id="ownerInput" type="text" autocomplete="off" placeholder="홍길동" required />
          </label>
          <label>
            <span>통신사</span>
            <input id="carrierInput" type="text" placeholder="통신사" required />
          </label>
          <label>
            <span>신규날짜</span>
            <input id="dateInput" type="date" required />
          </label>
          <label>
            <span>신규번호</span>
            <input id="phoneInput" type="tel" inputmode="numeric" autocomplete="off" placeholder="010-0000-0000" required />
          </label>
          <div id="duplicateWarning" class="duplicate-warning hidden"></div>
          <div class="form-actions">
            <button id="submitButton" type="submit" class="primary-action">추가</button>
            <button id="cancelEditButton" type="button" class="secondary hidden">취소</button>
          </div>
        </form>
      </section>

      <section class="info-strip" aria-label="저장과 공유 안내">
        <span>데이터는 현재 브라우저에 자동 저장됩니다.</span>
        <span>백업 파일을 저장해두면 다른 기기에서도 복원할 수 있습니다.</span>
      </section>

      <section class="controls" aria-label="목록 관리">
        <label>
          <span>명의자 보기</span>
          <select id="ownerFilter">
            <option value="all">전체</option>
          </select>
        </label>
        <div class="button-row">
          <div class="button-row-left">
            <button id="pinButton" type="button" class="secondary pin-action">PIN 설정</button>
          </div>
          <div class="button-row-right">
            <button id="backupButton" type="button" class="secondary">백업 저장</button>
            <button id="restoreButton" type="button" class="secondary">백업 불러오기</button>
          </div>
        </div>
        <p id="backupStatus" class="backup-status"></p>
        <input id="restoreInput" type="file" accept="application/json,.json" hidden />
      </section>

      <section id="summaryGrid" class="summary-grid" aria-label="명의자별 요약"></section>

      <section class="table-wrap" aria-label="신규회선 목록">
        <table>
          <thead>
            <tr>
              <th>회선정보</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="lineTable"></tbody>
        </table>
        <div id="emptyState" class="empty-state">
          <strong>아직 등록된 회선이 없습니다.</strong>
          <span>명의자, 통신사, 신규날짜, 신규번호를 넣으면 다음 가능 날짜가 자동 계산됩니다.</span>
        </div>
      </section>
    </main>

    <script src="./app.js?v=151"></script>
  </body>
</html>
